services:
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: retail_store
      MYSQL_USER: retail_user
      MYSQL_PASSWORD: retailpassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./retail-store-backend
    restart: unless-stopped
    environment:
      JWT_SECRET: fLAahHxAThKO8vyeaYrPFXUWYCise1Uj8nQCZnMi9G0=
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: retail_store
      DB_USER: retail_user
      DB_PASSWORD: retailpassword
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: ./retail-store-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
